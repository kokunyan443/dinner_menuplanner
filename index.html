<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夕食献立アプリ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3d7a56">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="献立アプリ">
  <style>
    :root {
      --primary: #3d7a56;
      --primary-light: #5a9e73;
      --primary-pale: #e8f5ee;
      --accent: #e07b00;
      --accent-pale: #fff3e0;
      --bg: #f5f3ef;
      --card: #ffffff;
      --text: #2d2d2d;
      --text-sub: #666;
      --border: #ddd9d2;
      --shadow: 0 2px 8px rgba(0,0,0,0.07);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Header / Tabs */
    .app-header { background: var(--primary); color: #fff; padding: 14px 16px 0; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    .header-top { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .app-icon { font-size: 1.4rem; }
    .app-title { font-size: 1.15rem; font-weight: 700; }
    .tabs { display: flex; gap: 3px; }
    .tab-btn { padding: 8px 18px; border: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 0.88rem; font-family: inherit; font-weight: 500; background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.82); transition: all 0.2s; }
    .tab-btn.active { background: var(--bg); color: var(--primary); font-weight: 700; }

    /* Page layout */
    .page { display: none; padding: 16px; max-width: 680px; margin: 0 auto; }
    .page.active { display: block; }

    /* Card */
    .card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 14px; }
    .card-title { font-size: 0.95rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

    /* Group filter pills */
    .group-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .pill { padding: 4px 13px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: all 0.18s; white-space: nowrap; }
    .pill.active { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 600; }

    /* Ingredient chips */
    .ing-list { display: flex; flex-direction: column; gap: 10px; }
    .ing-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0 2px; min-height: 28px; }
    .ing-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 20px; padding: 5px 5px 5px 11px; font-size: 0.85rem; transition: border-color 0.15s; }
    .ing-chip:hover { border-color: #b8d0c8; }
    .ing-chip-name { font-weight: 600; }
    .ing-chip-amount { color: var(--text-sub); font-size: 0.78rem; margin: 0 2px; }
    .ing-chip-edit { width: 22px; height: 22px; border: none; border-radius: 50%; background: #fef3c7; color: #b45309; cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
    .ing-chip-edit:hover { background: #fde68a; }
    .ing-chip-del { width: 22px; height: 22px; border: none; border-radius: 50%; background: #fee2e2; color: #dc2626; cursor: pointer; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
    .ing-chip-del:hover { background: #fca5a5; }
    .ing-chips-empty { font-size: 0.8rem; color: #bbb; padding: 4px 2px; }

    /* Quick-add inline */
    .btn-add-here { padding: 2px 10px; border: 1.5px dashed var(--primary); border-radius: 12px; background: transparent; color: var(--primary); font-size: 0.78rem; cursor: pointer; font-family: inherit; font-weight: 700; transition: all 0.15s; white-space: nowrap; }
    .btn-add-here:hover { background: var(--primary-pale); }
    .quick-add-row { display: flex; gap: 6px; align-items: center; padding: 8px 0 4px; flex-wrap: wrap; border-top: 1px dashed var(--border); margin-top: 6px; }
    .quick-add-row input { flex: 1; min-width: 80px; padding: 7px 9px; font-size: 0.83rem; border-radius: 8px; border: 1.5px solid var(--border); font-family: inherit; outline: none; background: #fff; }
    .quick-add-row input:focus { border-color: var(--primary); }
    .btn-qa-add { padding: 7px 14px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 0.83rem; font-family: inherit; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .btn-qa-add:hover { background: var(--primary-light); }
    .btn-qa-cancel { width: 30px; height: 30px; background: var(--border); color: var(--text-sub); border: none; border-radius: 50%; font-size: 0.85rem; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-qa-cancel:hover { background: #ccc9c0; }

    /* Form */
    .add-form { display: flex; flex-direction: column; gap: 10px; }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 120px; }
    .form-group label { font-size: 0.78rem; color: var(--text-sub); font-weight: 600; }
    input[type=text], input[type=number], select {
      padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.88rem; font-family: inherit; outline: none; transition: border-color 0.2s; background: #fff;
    }
    input:focus, select:focus { border-color: var(--primary); }
    .btn { padding: 9px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-family: inherit; font-weight: 700; transition: all 0.2s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-light); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #ccc9c0; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-lg { padding: 13px 24px; font-size: 1rem; width: 100%; }

    /* RSY-2 toggle */
    .rsy2-box { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; background: var(--accent-pale); border: 1.5px solid #f0c060; border-radius: 10px; margin-bottom: 14px; cursor: pointer; }
    .rsy2-box input[type=checkbox] { width: 17px; height: 17px; margin-top: 2px; flex-shrink: 0; accent-color: var(--accent); }
    .rsy2-box label { cursor: pointer; }
    .rsy2-title { font-weight: 700; font-size: 0.92rem; color: #7a4a00; }
    .rsy2-sub { font-size: 0.78rem; color: #a06000; margin-top: 2px; }

    /* RSY-2 dish type selector */
    .rsy2-type-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .rsy2-type-btn { padding: 4px 11px; border-radius: 15px; border: 1.5px solid #f0c060; background: #fff; font-size: 0.78rem; font-family: inherit; cursor: pointer; font-weight: 500; transition: all 0.18s; }
    .rsy2-type-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

    /* Meal display */
    .meal-section-label { font-size: 0.75rem; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; margin-top: 14px; }
    .dish-card { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-bottom: 7px; }
    .dish-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .dish-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 3px; }
    .dish-desc { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 3px; }
    .dish-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .tag { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
    .tag-rsy2 { background: #fef3c7; color: #b45309; border: 1px solid #f0c060; }
    .tag-ing { background: var(--primary-pale); color: var(--primary); border: 1px solid #b8e0c8; }
    /* 料理スタイルフィルター */
    .cuisine-row { background: #fff; border-radius: 10px; padding: 10px 14px; box-shadow: var(--shadow); margin-bottom: 14px; }
    .cuisine-label { font-size: 0.8rem; font-weight: 700; color: var(--text-sub); display: block; margin-bottom: 7px; }
    .cuisine-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .cuisine-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-size: 0.82rem; font-family: inherit; cursor: pointer; font-weight: 500; transition: all 0.18s; }
    .cuisine-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 700; }

    /* 材料内訳トグル */
    .dish-name-btn { background: none; border: none; padding: 0; text-align: left; cursor: pointer; font-family: inherit; width: 100%; }
    .dish-name-inner { display: flex; align-items: center; gap: 5px; }
    .dish-expand-icon { font-size: 0.75rem; color: var(--text-sub); transition: transform 0.2s; display: inline-block; }
    .dish-ings { margin-top: 8px; padding: 8px 10px; background: var(--bg); border-radius: 8px; display: none; }
    .dish-ings ul { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 4px; }
    .dish-ings li { font-size: 0.78rem; color: var(--text-sub); background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 2px 9px; }

    .btn-dish-edit { padding: 4px 11px; border: 1.5px solid var(--border); border-radius: 8px; background: #fff; color: var(--text-sub); font-size: 0.78rem; font-family: inherit; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
    .btn-dish-edit:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-pale); }
    .btn-dish-del-modal { padding: 8px 16px; background: #fee2e2; color: #dc2626; border: none; border-radius: 8px; font-size: 0.88rem; font-family: inherit; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .btn-dish-del-modal:hover { background: #fca5a5; }
    .recipe-option { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; background: #fff; }
    .recipe-option:hover { border-color: var(--primary); background: var(--primary-pale); }
    .recipe-option.has-ing { border-left: 3px solid var(--primary); }
    .recipe-option-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 2px; }
    .recipe-option-desc { font-size: 0.78rem; color: var(--text-sub); margin-bottom: 3px; }
    .recipe-option-nut { font-size: 0.72rem; color: var(--text-sub); }
    .recipe-ing-badge { font-size: 0.68rem; font-weight: 700; color: var(--primary); background: var(--primary-pale); padding: 1px 6px; border-radius: 8px; margin-left: 5px; }

    /* Nutrition */
    .nutrition-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
    .nut-cell { background: var(--bg); border-radius: 9px; padding: 10px 8px; text-align: center; border: 1.5px solid var(--border); }
    .nut-label { font-size: 0.7rem; color: var(--text-sub); margin-bottom: 3px; }
    .nut-value { font-size: 1rem; font-weight: 700; }
    .nut-target { font-size: 0.68rem; color: var(--text-sub); margin-top: 1px; }
    .nut-ok { color: #16a34a; }
    .nut-ng { color: #dc2626; }
    .nut-bar-wrap { margin-bottom: 6px; }
    .nut-bar-label { display: flex; justify-content: space-between; font-size: 0.73rem; margin-bottom: 2px; }
    .nut-bar-bg { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .nut-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s; }
    .bar-kcal { background: #f97316; }
    .bar-protein { background: #3b82f6; }
    .bar-carb { background: #a855f7; }
    .bar-salt { background: #6b7280; }

    /* Saved meals */
    .saved-card { background: var(--card); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .saved-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .saved-date { font-weight: 700; color: var(--primary); font-size: 0.92rem; }
    .saved-dishes { font-size: 0.83rem; color: var(--text-sub); line-height: 1.6; }
    .saved-nut { display: flex; gap: 10px; margin-top: 6px; font-size: 0.78rem; flex-wrap: wrap; }
    .saved-nut span { background: var(--bg); padding: 2px 8px; border-radius: 10px; color: var(--text-sub); }

    /* Empty state */
    .empty { text-align: center; color: var(--text-sub); padding: 36px 16px; font-size: 0.9rem; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 8px; }

    /* Toast */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 10px 20px; border-radius: 22px; font-size: 0.88rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; }

    /* Modal */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 22px; width: 92%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

    .group-section { background: #fff; border-radius: 12px; padding: 11px 13px 10px; box-shadow: var(--shadow); }
    .group-section-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.88rem; font-weight: 700; color: var(--primary); padding-bottom: 7px; border-bottom: 2px solid var(--primary-pale); margin-bottom: 6px; }
    .group-section-header-left { display: flex; align-items: center; gap: 6px; }
    .group-count { font-size: 0.72rem; font-weight: 500; color: var(--text-sub); background: var(--primary-pale); padding: 1px 8px; border-radius: 10px; }

    .rsy2-mini { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 11px 14px; background: var(--accent-pale); border: 1.5px solid #f0c060; border-radius: 10px; margin: 10px 0 8px; cursor: pointer; }
    .rsy2-mini input[type=checkbox] { width: 17px; height: 17px; flex-shrink: 0; accent-color: var(--accent); border: none; padding: 0; }
    .rsy2-mini-label { font-size: 0.9rem; font-weight: 700; color: #7a4a00; cursor: pointer; }

    .divider { height: 1px; background: var(--border); margin: 12px 0; }
    .generate-area { text-align: center; }
    .no-ing-warn { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 10px 14px; font-size: 0.83rem; color: #856404; margin-bottom: 14px; }

    /* ===== Bottom Navigation (mobile) ===== */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1px solid var(--border);
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bottom-nav-inner { display: flex; }
    .bottom-nav-btn {
      flex: 1; padding: 10px 0 8px;
      border: none; background: transparent;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      font-size: 0.7rem; font-family: inherit; color: var(--text-sub);
      cursor: pointer; transition: color 0.18s;
    }
    .bottom-nav-btn .bnav-icon { font-size: 1.35rem; line-height: 1; }
    .bottom-nav-btn.active { color: var(--primary); font-weight: 700; }
    .bottom-nav-btn:active { opacity: 0.6; }

    /* Touch active feedback */
    .btn:active, .pill:active, .cuisine-btn:active, .rsy2-type-btn:active { opacity: 0.7; }
    .ing-chip-edit:active, .ing-chip-del:active { opacity: 0.65; }

    @media (max-width: 600px) {
      /* Show bottom nav, hide top tabs */
      .bottom-nav { display: block; }
      .tabs { display: none; }
      .app-header { padding-bottom: 14px; }

      /* Content padding so bottom nav doesn't overlap */
      .page { padding-bottom: calc(68px + env(safe-area-inset-bottom)); }

      /* Toast above bottom nav */
      .toast { bottom: calc(72px + env(safe-area-inset-bottom)); }

      /* Prevent iOS zoom on inputs */
      input[type=text], input[type=number], select,
      .quick-add-row input { font-size: 16px; }

      /* Larger touch targets for chip buttons */
      .ing-chip-edit, .ing-chip-del {
        width: 36px; height: 36px; font-size: 0.85rem;
      }

      /* Nutrition grid 2-column on mobile */
      .nutrition-grid { grid-template-columns: repeat(2, 1fr); }

      /* Group pills scroll horizontally */
      .group-pills { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
      .pill { white-space: nowrap; flex-shrink: 0; }

      /* Cuisine buttons scroll */
      .cuisine-btns { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .cuisine-btn { flex-shrink: 0; }

      /* RSY-2 type buttons scroll */
      .rsy2-type-row { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .rsy2-type-btn { flex-shrink: 0; }

      /* Modal better on small screens */
      .modal { width: 96%; padding: 18px 16px; }
      .dish-edit-overlay .modal { max-height: 88vh; }

      /* Dish edit button larger tap area */
      .btn-dish-edit { padding: 8px 14px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <span class="app-icon">🍽️</span>
    <span class="app-title">夕食献立アプリ</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('ingredients')">食材登録</button>
    <button class="tab-btn" onclick="switchTab('create')">献立作成</button>
    <button class="tab-btn" onclick="switchTab('saved')">保存済み</button>
  </div>
</div>

<!-- ===== TAB: 食材登録 ===== -->
<div id="page-ingredients" class="page active">
  <div class="card">
    <div class="card-title">📦 食品群で絞り込み</div>
    <div class="group-pills" id="group-filter">
      <button class="pill active" data-group="all" onclick="filterGroup('all',this)">すべて</button>
      <button class="pill" data-group="肉類" onclick="filterGroup('肉類',this)">🥩 肉類</button>
      <button class="pill" data-group="魚介類" onclick="filterGroup('魚介類',this)">🐟 魚介類</button>
      <button class="pill" data-group="卵・大豆製品" onclick="filterGroup('卵・大豆製品',this)">🥚 卵・大豆</button>
      <button class="pill" data-group="野菜・きのこ" onclick="filterGroup('野菜・きのこ',this)">🥦 野菜・きのこ</button>
      <button class="pill" data-group="海藻・乾物" onclick="filterGroup('海藻・乾物',this)">🌿 海藻・乾物</button>
      <button class="pill" data-group="乳製品" onclick="filterGroup('乳製品',this)">🥛 乳製品</button>
      <button class="pill" data-group="穀物・麺・パン" onclick="filterGroup('穀物・麺・パン',this)">🍚 穀物・麺・パン</button>
      <button class="pill" data-group="調味料・油脂" onclick="filterGroup('調味料・油脂',this)">🧂 調味料・油脂</button>
      <button class="pill" data-group="その他" onclick="filterGroup('その他',this)">📌 その他</button>
    </div>
    <div id="ing-list" class="ing-list"></div>
    <div id="ing-empty" class="empty" style="display:none">
      <div class="empty-icon">📭</div>
      食材が登録されていません
    </div>
  </div>

  <div class="card">
    <div class="card-title">➕ 食材を追加 <span style="font-size:0.75rem;font-weight:400;color:var(--text-sub)">（グループを選んで登録）</span></div>
    <div class="add-form">
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label>食材名</label>
          <input type="text" id="ing-name" placeholder="例: 鶏むね肉">
        </div>
        <div class="form-group">
          <label>量</label>
          <input type="text" id="ing-amount" placeholder="300g">
        </div>
      </div>
      <div class="form-group">
        <label>食品群</label>
        <select id="ing-group">
          <option value="肉類">🥩 肉類</option>
          <option value="魚介類">🐟 魚介類</option>
          <option value="卵・大豆製品">🥚 卵・大豆製品</option>
          <option value="野菜・きのこ">🥦 野菜・きのこ</option>
          <option value="海藻・乾物">🌿 海藻・乾物</option>
          <option value="乳製品">🥛 乳製品</option>
          <option value="穀物・麺・パン">🍚 穀物・麺・パン</option>
          <option value="調味料・油脂">🧂 調味料・油脂</option>
          <option value="その他">📌 その他</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="addIngredient()">追加する</button>
    </div>
  </div>
</div>

<!-- ===== TAB: 献立作成 ===== -->

// ========== INGREDIENTS ==========
let currentGroup = 'all';
let editingId = null;

function filterGroup(group, btn) {
  currentGroup = group;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  // 下部フォームのグループ選択を連動
  if (group !== 'all') {
    const sel = document.getElementById('ing-group');
    if (sel) sel.value = group;
  }
  renderIngredients();
}

const GROUP_ORDER = ['肉類','魚介類','卵・大豆製品','野菜・きのこ','海藻・乾物','乳製品','穀物・麺・パン','調味料・油脂','その他'];
const GROUP_ICON = { '肉類':'🥩','魚介類':'🐟','卵・大豆製品':'🥚','野菜・きのこ':'🥦','海藻・乾物':'🌿','乳製品':'🥛','穀物・麺・パン':'🍚','調味料・油脂':'🧂','その他':'📌' };

function renderIngredients() {
  const list = document.getElementById('ing-list');
  const empty = document.getElementById('ing-empty');
  const all = getIngredients();

  const byGroup = {};
  for (const ing of all) {
    if (!byGroup[ing.group]) byGroup[ing.group] = [];
    byGroup[ing.group].push(ing);
  }

  if (currentGroup !== 'all') {
    // 特定グループ：空でもセクションを表示（インライン追加できる）
    empty.style.display = 'none';
    list.innerHTML = groupSectionHTML(currentGroup, byGroup[currentGroup] || []);
    return;
  }

  // すべて：登録済みのグループのみ表示
  const displayGroups = GROUP_ORDER.filter(g => byGroup[g]);
  for (const g of Object.keys(byGroup)) {
    if (!displayGroups.includes(g)) displayGroups.push(g);
  }

  if (displayGroups.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = displayGroups.map(g => groupSectionHTML(g, byGroup[g])).join('');
}

function groupSectionHTML(g, items) {
  const idx = GROUP_ORDER.indexOf(g);
  const safeId = idx >= 0 ? idx : 'x' + g.length; // fallback for unknown groups
  return `<div class="group-section">
    <div class="group-section-header">
      <div class="group-section-header-left">
        <span>${GROUP_ICON[g] || '📦'} ${esc(g)}</span>
        ${items.length > 0 ? `<span class="group-count">${items.length}品</span>` : ''}
      </div>
      <button class="btn-add-here" onclick="toggleQuickAdd(${safeId})">＋ 追加</button>
    </div>
    <div class="quick-add-row" id="qa-${safeId}" style="display:none">
      <input type="text" id="qa-name-${safeId}" placeholder="食材名"
        onkeydown="if(event.key==='Enter')quickAdd(${safeId})">
      <input type="text" id="qa-amt-${safeId}" placeholder="量" style="max-width:80px"
        onkeydown="if(event.key==='Enter')quickAdd(${safeId})">
      <button class="btn-qa-add" onclick="quickAdd(${safeId})">追加</button>
      <button class="btn-qa-cancel" onclick="toggleQuickAdd(${safeId})">✕</button>
    </div>
    <div class="ing-chips">
      ${items.length > 0 ? items.map(ing => ingChipHTML(ing)).join('') : '<span class="ing-chips-empty">未登録</span>'}
    </div>
  </div>`;
}

function ingChipHTML(ing) {
  return `<div class="ing-chip">
    <span class="ing-chip-name">${esc(ing.name)}</span>
    <span class="ing-chip-amount">${esc(ing.amount)}</span>
    <button class="ing-chip-edit" onclick="openEdit(${ing.id})" title="編集">✏</button>
    <button class="ing-chip-del" onclick="deleteIng(${ing.id})" title="削除">✕</button>
  </div>`;
}

function toggleQuickAdd(idx) {
  const row = document.getElementById('qa-' + idx);
  if (!row) return;
  const isOpen = row.style.display !== 'none';
  row.style.display = isOpen ? 'none' : 'flex';
  if (!isOpen) {
    const nameInput = document.getElementById('qa-name-' + idx);
    if (nameInput) nameInput.focus();
  }
}

function quickAdd(idx) {
  const g = GROUP_ORDER[idx] || GROUP_ORDER[0];
  const nameEl = document.getElementById('qa-name-' + idx);
  const amtEl = document.getElementById('qa-amt-' + idx);
  if (!nameEl) return;
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); showToast('食材名を入力してください'); return; }
  const amount = amtEl.value.trim() || '適量';
  const list = getIngredients();
  list.push({ id: Date.now(), name, amount, group: g });
  setIngredients(list);
  nameEl.value = '';
  amtEl.value = '';
  nameEl.focus();
  renderIngredients();
  showToast(`「${name}」を追加しました`);
}

function addIngredient() {
  const name = document.getElementById('ing-name').value.trim();
  const amount = document.getElementById('ing-amount').value.trim();
  const group = document.getElementById('ing-group').value;
  if (!name) { showToast('食材名を入力してください'); return; }
  const list = getIngredients();
  list.push({ id: Date.now(), name, amount: amount || '適量', group });
  setIngredients(list);
  document.getElementById('ing-name').value = '';
  document.getElementById('ing-amount').value = '';
  renderIngredients();
  showToast('追加しました');
}

function deleteIng(id) {
  const list = getIngredients().filter(i => i.id !== id);
  setIngredients(list);
  renderIngredients();
  showToast('削除しました');
}

function openEdit(id) {
  const ing = getIngredients().find(i => i.id === id);
  if (!ing) return;
  editingId = id;
  document.getElementById('edit-name').value = ing.name;
  document.getElementById('edit-amount').value = ing.amount;
  document.getElementById('edit-group').value = ing.group;
  document.getElementById('edit-overlay').classList.add('open');
}

function saveEdit() {
  const list = getIngredients();
  const idx = list.findIndex(i => i.id === editingId);
  if (idx < 0) return;
  list[idx].name = document.getElementById('edit-name').value.trim() || list[idx].name;
  list[idx].amount = document.getElementById('edit-amount').value.trim() || list[idx].amount;
  list[idx].group = document.getElementById('edit-group').value;
  setIngredients(list);
  closeModal();
  renderIngredients();
  showToast('更新しました');
}

function closeModal() { document.getElementById('edit-overlay').classList.remove('open'); }
function closeDishModal() { document.getElementById('dish-edit-overlay').classList.remove('open'); }

// ========== DISH EDIT / DELETE ==========
let editingSlot = null;
let editCandidates = [];

function openDishEdit(slotKey) {
  editingSlot = slotKey;
  const titleMap = { staple:'主食を変更', main:'主菜を変更・削除', soup:'汁物・スープを変更・削除' };
  const title = slotKey.startsWith('side') ? '副菜を変更・削除' : (titleMap[slotKey] || '料理を変更・削除');
  document.getElementById('dish-edit-title').textContent = title;

  // 削除ボタン（主食以外で表示）
  const canDelete = slotKey !== 'staple';
  const deleteBtn = canDelete
    ? `<button class="btn-dish-del-modal" onclick="deleteDish('${slotKey}')">🗑️ このメニューを削除</button>`
    : '';

  let pool = [];
  if (slotKey === 'staple') {
    pool = RECIPES.staple.map(r => ({ recipe: r, available: true }));
  } else if (slotKey === 'main') {
    const avail = RECIPES.main.filter(r => hasIngredient(r.keys));
    const other = RECIPES.main.filter(r => !hasIngredient(r.keys));
    pool = [...avail.map(r => ({ recipe: r, available: true })), ...other.map(r => ({ recipe: r, available: false }))];
  } else if (slotKey.startsWith('side')) {
    const avail = RECIPES.side.filter(r => hasIngredient(r.keys));
    const other = RECIPES.side.filter(r => !hasIngredient(r.keys));
    pool = [...avail.map(r => ({ recipe: r, available: true })), ...other.map(r => ({ recipe: r, available: false }))];
  } else if (slotKey === 'soup') {
    const base = currentMeal.useRSY2 ? RECIPES.soup.filter(r => r.rsy2type === currentMeal.rsy2Type) : RECIPES.soup;
    const avail = base.filter(r => hasIngredient(r.keys));
    const other = base.filter(r => !hasIngredient(r.keys));
    pool = [...avail.map(r => ({ recipe: r, available: true })), ...other.map(r => ({ recipe: r, available: false }))];
  }

  editCandidates = pool;
  document.getElementById('dish-edit-list').innerHTML =
    (deleteBtn ? `<div style="margin-bottom:4px">${deleteBtn}</div><div style="font-size:0.78rem;color:var(--text-sub);margin-bottom:6px;padding-left:2px">または別のメニューに変更：</div>` : '') +
    pool.map((c, idx) => `
      <div class="recipe-option ${c.available ? 'has-ing' : ''}" onclick="selectDish(${idx})">
        <div style="flex:1">
          <div class="recipe-option-name">${esc(c.recipe.name)}${c.available ? '<span class="recipe-ing-badge">食材あり</span>' : ''}</div>
          <div class="recipe-option-desc">${esc(c.recipe.desc)}</div>
          <div class="recipe-option-nut">${c.recipe.kcal}kcal &nbsp;P ${c.recipe.protein}g &nbsp;糖 ${c.recipe.carb}g &nbsp;塩 ${c.recipe.salt}g</div>
        </div>
      </div>
    `).join('');

  document.getElementById('dish-edit-overlay').classList.add('open');
}

function deleteDish(slotKey) {
  if (slotKey === 'main') {
    currentMeal.main = null;
  } else if (slotKey.startsWith('side-')) {
    const idx = parseInt(slotKey.split('-')[1]);
    currentMeal.sides.splice(idx, 1);
  } else if (slotKey === 'soup') {
    currentMeal.soup = null;
  }
  recalcNutrition();
  renderMeal(currentMeal);
  closeDishModal();
  showToast('削除しました');
}

function selectDish(idx) {
  const recipe = editCandidates[idx].recipe;
  if (editingSlot === 'staple') {
    currentMeal.staple = recipe;
  } else if (editingSlot === 'main') {
    currentMeal.main = recipe;
  } else if (editingSlot.startsWith('side-')) {
    const sideIdx = parseInt(editingSlot.split('-')[1]);
    currentMeal.sides[sideIdx] = recipe;
  } else if (editingSlot === 'soup') {
    currentMeal.soup = recipe;
  }
  recalcNutrition();
  renderMeal(currentMeal);
  closeDishModal();
  showToast(`「${recipe.name}」に変更しました`);
}

function recalcNutrition() {
  let kcal = currentMeal.staple.kcal, protein = currentMeal.staple.protein;
  let carb = currentMeal.staple.carb, salt = currentMeal.staple.salt;
  if (currentMeal.main) {
    kcal += currentMeal.main.kcal; protein += currentMeal.main.protein;
    carb += currentMeal.main.carb; salt += currentMeal.main.salt;
  }
  for (const s of currentMeal.sides) {
    kcal += s.kcal; protein += s.protein; carb += s.carb; salt += s.salt;
  }
  if (currentMeal.soup) {
    kcal += currentMeal.soup.kcal; protein += currentMeal.soup.protein;
    carb += currentMeal.soup.carb; salt += currentMeal.soup.salt;
  }
  currentMeal.nut = { kcal, protein, carb, salt };
}

// ========== RSY-2 ==========
let rsy2Type = 'soup';

function toggleRSY2() {
  const cb = document.getElementById('rsy2-check');
  cb.checked = !cb.checked;
  updateRSY2UI();
}

function onRSY2Change(e) {
  e.stopPropagation();
  updateRSY2UI();
}

function updateRSY2UI() {
  const checked = document.getElementById('rsy2-check').checked;
  document.getElementById('rsy2-types').style.display = checked ? 'flex' : 'none';
  // ミニトグルと同期
  const mini = document.getElementById('rsy2-mini-check');
  if (mini) mini.checked = checked;
  const miniTypes = document.getElementById('rsy2-mini-types');
  if (miniTypes) miniTypes.style.display = checked ? 'flex' : 'none';
}

function toggleRSY2Mini() {
  const mini = document.getElementById('rsy2-mini-check');
  mini.checked = !mini.checked;
  onRSY2MiniChange({ stopPropagation: () => {} });
}

function onRSY2MiniChange(e) {
  const checked = document.getElementById('rsy2-mini-check').checked;
  // メインのチェックボックスと同期
  document.getElementById('rsy2-check').checked = checked;
  document.getElementById('rsy2-types').style.display = checked ? 'flex' : 'none';
  document.getElementById('rsy2-mini-types').style.display = checked ? 'flex' : 'none';
}

function selectRSY2Type(btn) {
  document.querySelectorAll('.rsy2-type-btn').forEach(b => b.classList.remove('active'));
  // 同じdata-typeを持つすべてのボタンをアクティブに
  document.querySelectorAll(`.rsy2-type-btn[data-type="${btn.dataset.type}"]`).forEach(b => b.classList.add('active'));
  rsy2Type = btn.dataset.type;
}

// ========== MEAL GENERATION ==========
let currentMeal = null;

function hasIngredient(keys) {
  const ings = getIngredients();
  return keys.some(k => ings.some(i => i.name.includes(k) || k.includes(i.name.slice(0,2))));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getUsedIngs(keys) {
  const ings = getIngredients();
  return keys.filter(k => ings.some(i => i.name.includes(k) || k.includes(i.name.slice(0,2))));
}

function generateMeal() {
  const useRSY2 = document.getElementById('rsy2-check').checked;
  const ings = getIngredients();

  if (ings.length === 0) {
    showToast('食材を先に登録してください');
    return;
  }

  // 料理スタイルフィルター + 食材フィルター
  const mainPool = filterByCuisine(RECIPES.main);
  const sidePool = filterByCuisine(RECIPES.side);
  const availableMain = mainPool.filter(r => hasIngredient(r.keys));
  const availableSide = sidePool.filter(r => hasIngredient(r.keys));
  const availableSoup = RECIPES.soup.filter(r => hasIngredient(r.keys) && r.rsy2type === rsy2Type);

  // RSY-2 pasta requires special staple
  const isPastaMode = useRSY2 && rsy2Type === 'pasta';
  const isPortidgeMode = useRSY2 && (rsy2Type === 'porridge' || rsy2Type === 'risotto');

  // Pick staple
  const staple = isPastaMode ? PASTA_STAPLE : RECIPES.staple[Math.floor(Math.random() * RECIPES.staple.length)];

  // Nutrition targets (with staple already counted):
  // Total: 350-500kcal, P:30-45g, C:100-120g, Salt:3-5g
  // After staple: remaining budget (approximate)
  const budget = { kcal: 350 - staple.kcal, kcalMax: 500 - staple.kcal, protein: 30 - staple.protein, proteinMax: 45 - staple.protein, carb: 100 - staple.carb, carbMax: 120 - staple.carb, salt: 3 - staple.salt, saltMax: 5 - staple.salt };

  // Pick main dish (highest protein priority)
  const shuffledMain = shuffle(availableMain);
  let chosenMain = shuffledMain[0] || null;

  if (!chosenMain && !isPortidgeMode) {
    // No available main - show a default note
    chosenMain = null;
  }

  // 登録食材でレシピが見つからない場合は警告
  if (!chosenMain && !isPortidgeMode && availableMain.length === 0) {
    showToast('登録食材で作れる主菜が見つかりません。食材を追加してください。');
    return;
  }

  // Pick RSY-2 soup if requested（登録食材のみ）
  let chosenSoup = null;
  if (useRSY2 && availableSoup.length > 0) {
    chosenSoup = shuffle(availableSoup)[0];
  } else if (useRSY2 && availableSoup.length === 0) {
    showToast('登録食材でRSY-2メニューが作れません。食材を追加するか種類を変えてください。');
    return;
  }

  // Calculate used kcal so far
  let usedKcal = staple.kcal;
  let usedProt = staple.protein;
  let usedCarb = staple.carb;
  let usedSalt = staple.salt;

  if (chosenMain) { usedKcal += chosenMain.kcal; usedProt += chosenMain.protein; usedCarb += chosenMain.carb; usedSalt += chosenMain.salt; }
  if (chosenSoup) { usedKcal += chosenSoup.kcal; usedProt += chosenSoup.protein; usedCarb += chosenSoup.carb; usedSalt += chosenSoup.salt; }

  // 副菜が1件もマッチしない場合のみエラー
  if (availableSide.length === 0) {
    showToast('登録食材で作れる副菜が見つかりません。野菜・きのこ等を追加してください。');
    return;
  }

  // Pick 2-3 side dishes（登録食材のみ）
  const shuffledSide = shuffle(availableSide);
  const chosenSides = [];
  const TARGET_SIDES = chosenMain ? 2 : 3;

  for (const s of shuffledSide) {
    if (chosenSides.length >= TARGET_SIDES) break;
    const newKcal = usedKcal + s.kcal;
    const newSalt = usedSalt + s.salt;
    // 1品目は必ず追加、2品目以降だけカロリー・塩分ガードを適用
    if (chosenSides.length > 0 && (newKcal > 530 || newSalt > 5.5)) continue;
    chosenSides.push(s);
    usedKcal += s.kcal; usedProt += s.protein; usedCarb += s.carb; usedSalt += s.salt;
  }

  currentMeal = { staple, main: chosenMain, sides: chosenSides, soup: chosenSoup, useRSY2, rsy2Type,
    nut: { kcal: usedKcal, protein: usedProt, carb: usedCarb, salt: usedSalt } };

  renderMeal(currentMeal);
}

function renderMeal(meal) {
  const el = document.getElementById('meal-dishes');
  let html = '';

  // Staple
  html += `<div class="meal-section-label">主食</div>`;
  html += dishCard(meal.staple, false, false, null, 'staple');

  // Main
  if (meal.main) {
    html += `<div class="meal-section-label">主菜</div>`;
    const usedKeys = getUsedIngs(meal.main.keys);
    html += dishCard(meal.main, false, false, usedKeys, 'main');
  }

  // Sides
  if (meal.sides.length > 0) {
    html += `<div class="meal-section-label">副菜</div>`;
    meal.sides.forEach((s, idx) => {
      const usedKeys = getUsedIngs(s.keys);
      html += dishCard(s, false, false, usedKeys, `side-${idx}`);
    });
  }

  // Soup / RSY-2
  if (meal.soup) {
    const labelMap = { soup:'汁物・スープ', potage:'ポタージュ', porridge:'お粥', risotto:'リゾット', pasta:'パスタソース' };
    html += `<div class="meal-section-label">${meal.useRSY2 ? '🔶 RSY-2 / ' : ''}${labelMap[meal.rsy2Type] || '汁物'}</div>`;
    const usedKeys = getUsedIngs(meal.soup.keys);
    html += dishCard(meal.soup, meal.useRSY2, meal.useRSY2, usedKeys, 'soup');
  }

  el.innerHTML = html;
  renderNutrition(meal.nut);
  document.getElementById('meal-result').style.display = 'block';
}

function dishCard(recipe, showRSY2Tag, isRSY2, usedKeys, slotKey) {
  const tags = [];
  if (showRSY2Tag) tags.push(`<span class="tag tag-rsy2">🔶 RSY-2</span>`);
  if (usedKeys && usedKeys.length > 0) {
    tags.push(`<span class="tag tag-ing">📦 ${usedKeys.join('・')}</span>`);
  }
  const ingsList = recipe.ings
    ? `<div class="dish-ings"><ul>${recipe.ings.map(i => `<li>${esc(i)}</li>`).join('')}</ul></div>`
    : '';
  return `<div class="dish-card">
    <div class="dish-card-header">
      <button class="dish-name-btn" onclick="toggleDishIng(this)" style="flex:1">
        <div class="dish-name-inner">
          <span class="dish-name">${esc(recipe.name)}</span>
          ${recipe.ings ? '<span class="dish-expand-icon">▶</span>' : ''}
        </div>
        <div class="dish-desc">${esc(recipe.desc)}</div>
        ${ingsList}
      </button>
      <button class="btn-dish-edit" onclick="openDishEdit('${slotKey}')">変更・削除</button>
    </div>
    ${tags.length > 0 ? `<div class="dish-tags">${tags.join('')}</div>` : ''}
  </div>`;
}

function toggleDishIng(btn) {
  const ings = btn.querySelector('.dish-ings');
  const icon = btn.querySelector('.dish-expand-icon');
  if (!ings) return;
  const open = ings.style.display === 'block';
  ings.style.display = open ? 'none' : 'block';
  if (icon) icon.style.transform = open ? '' : 'rotate(90deg)';
}

function renderNutrition(nut) {
  const targets = [
    { label: 'エネルギー', unit: 'kcal', val: nut.kcal, min: 350, max: 500, barClass: 'bar-kcal' },
    { label: 'たんぱく質', unit: 'g', val: nut.protein, min: 30, max: 45, barClass: 'bar-protein' },
    { label: '糖質', unit: 'g', val: nut.carb, min: 100, max: 120, barClass: 'bar-carb' },
    { label: '食塩相当量', unit: 'g', val: nut.salt, min: 3, max: 5, barClass: 'bar-salt' },
  ];

  const gridEl = document.getElementById('nut-grid');
  gridEl.innerHTML = targets.map(t => {
    const ok = t.val >= t.min && t.val <= t.max;
    return `<div class="nut-cell">
      <div class="nut-label">${t.label}</div>
      <div class="nut-value ${ok ? 'nut-ok' : 'nut-ng'}">${Math.round(t.val * 10) / 10}<span style="font-size:0.7rem;font-weight:400">${t.unit}</span></div>
      <div class="nut-target">${t.min}〜${t.max}${t.unit}</div>
    </div>`;
  }).join('');

  const barsEl = document.getElementById('nut-bars');
  barsEl.innerHTML = targets.map(t => {
    const pct = Math.min(Math.round(t.val / t.max * 100), 115);
    const okColor = t.val >= t.min && t.val <= t.max ? t.barClass : (t.val < t.min ? '#ef4444' : '#f97316');
    return `<div class="nut-bar-wrap">
      <div class="nut-bar-label">
        <span>${t.label}</span>
        <span>${Math.round(t.val * 10) / 10}${t.unit} / 目標 ${t.min}〜${t.max}${t.unit}</span>
      </div>
      <div class="nut-bar-bg"><div class="nut-bar-fill ${t.barClass}" style="width:${pct}%;background-color:${okColor}"></div></div>
    </div>`;
  }).join('');
}

// ========== SAVE MEAL ==========
function saveMeal() {
  if (!currentMeal) return;
  const saved = getSaved();
  const now = new Date();
  const label = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  saved.unshift({ id: Date.now(), date: label, meal: currentMeal });
  setSaved(saved);
  showToast('献立を保存しました');
}

// ========== SAVED LIST ==========
function renderSaved() {
  const saved = getSaved();
  const el = document.getElementById('saved-list');
  const empty = document.getElementById('saved-empty');

  if (saved.length === 0) {
    el.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  el.innerHTML = saved.map(s => {
    const m = s.meal;
    const dishes = [m.staple.name];
    if (m.main) dishes.push(m.main.name);
    m.sides.forEach(sd => dishes.push(sd.name));
    if (m.soup) dishes.push(m.soup.name);
    const n = m.nut;
    const rsy2label = m.useRSY2 ? `<span style="color:var(--accent);font-size:0.78rem">🔶 RSY-2使用</span> ` : '';
    return `<div class="saved-card">
      <div class="saved-header">
        <span class="saved-date">📅 ${esc(s.date)}</span>
        <button class="btn btn-danger" style="padding:4px 12px;font-size:0.78rem" onclick="deleteSaved(${s.id})">削除</button>
      </div>
      <div class="saved-dishes">${rsy2label}${dishes.map(d => '・' + esc(d)).join('<br>')}</div>
      <div class="saved-nut">
        <span>🔥 ${Math.round(n.kcal)}kcal</span>
        <span>🥩 P ${Math.round(n.protein * 10) / 10}g</span>
        <span>🍚 糖 ${Math.round(n.carb * 10) / 10}g</span>
        <span>🧂 塩 ${Math.round(n.salt * 10) / 10}g</span>
      </div>
    </div>`;
  }).join('');
}

function deleteSaved(id) {
  setSaved(getSaved().filter(s => s.id !== id));
  renderSaved();
  showToast('削除しました');
}

// ========== UTILS ==========
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Enter key for ingredient add
document.getElementById('ing-amount').addEventListener('keydown', e => { if (e.key === 'Enter') addIngredient(); });
document.getElementById('ing-name').addEventListener('keydown', e => { if (e.key === 'Enter') addIngredient(); });

// Init
renderIngredients();

(function() {
  const canvas = document.createElement('canvas');
  canvas.width = 180; canvas.height = 180;
  const ctx = canvas.getContext('2d');
  const r = 36, w = 180, h = 180;
  ctx.fillStyle = '#3d7a56';
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(w - r, 0);
  ctx.quadraticCurveTo(w, 0, w, r);
  ctx.lineTo(w, h - r);
  ctx.quadraticCurveTo(w, h, w - r, h);
  ctx.lineTo(r, h);
  ctx.quadraticCurveTo(0, h, 0, h - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();
  ctx.font = '108px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🍽️', 90, 94);
  const link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = canvas.toDataURL('image/png');
  document.head.appendChild(link);
})();
